name: Build Bimbo Takeover EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywin32 pillow
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name bimbo_takeover bimbo_takeover.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: bimbo-takeover-windows
          path: dist/bimbo_takeover.exe
